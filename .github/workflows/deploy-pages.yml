name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *"
    - cron: "15,30,45 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  collect-persist:
    uses: ./.github/workflows/_collect-persist.yml
    with:
      refresh_mode: ${{ github.event_name == 'schedule' && github.event.schedule == '15,30,45 * * * *' && 'fast' || 'full' }}
      require_durable_baseline: ${{ github.event_name == 'schedule' && github.event.schedule == '15,30,45 * * * *' }}
      public_crypto_market_data_approved: ${{ vars.PUBLIC_CRYPTO_MARKET_DATA_APPROVED == '1' }}
      cmc_redistribution_approved: ${{ vars.CMC_REDISTRIBUTION_APPROVED != '0' }}
      defillama_redistribution_approved: ${{ vars.DEFILLAMA_REDISTRIBUTION_APPROVED == '1' }}
      sosovalue_redistribution_approved: ${{ vars.SOSOVALUE_REDISTRIBUTION_APPROVED == '1' }}
      blockbeats_aux_enabled: ${{ vars.BLOCKBEATS_AUX_ENABLED == '1' }}
      blockbeats_redistribution_approved: ${{ vars.BLOCKBEATS_REDISTRIBUTION_APPROVED == '1' }}
      alpaca_redistribution_approved: ${{ vars.ALPACA_REDISTRIBUTION_APPROVED == '1' }}
      fred_third_party_series_approved: ${{ vars.FRED_THIRD_PARTY_SERIES_APPROVED == '1' }}
      adp_data_display_approved: ${{ vars.ADP_DATA_DISPLAY_APPROVED == '1' }}
      cyclelens_require_market_history: ${{ vars.MARKET_HISTORY_REQUIRED == '1' }}
    secrets: inherit

  project-public-snapshots:
    needs: collect-persist
    uses: ./.github/workflows/_project-public-snapshots.yml
    with:
      cmc_redistribution_approved: ${{ vars.CMC_REDISTRIBUTION_APPROVED != '0' }}
      defillama_redistribution_approved: ${{ vars.DEFILLAMA_REDISTRIBUTION_APPROVED == '1' }}
      sosovalue_redistribution_approved: ${{ vars.SOSOVALUE_REDISTRIBUTION_APPROVED == '1' }}
      blockbeats_aux_enabled: ${{ vars.BLOCKBEATS_AUX_ENABLED == '1' }}
      blockbeats_redistribution_approved: ${{ vars.BLOCKBEATS_REDISTRIBUTION_APPROVED == '1' }}
      fred_third_party_series_approved: ${{ vars.FRED_THIRD_PARTY_SERIES_APPROVED == '1' }}

  build:
    needs: project-public-snapshots
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: "true"
      CMC_REDISTRIBUTION_APPROVED: ${{ vars.CMC_REDISTRIBUTION_APPROVED || '1' }}
      DEFILLAMA_REDISTRIBUTION_APPROVED: ${{ vars.DEFILLAMA_REDISTRIBUTION_APPROVED || '0' }}
      SOSOVALUE_REDISTRIBUTION_APPROVED: ${{ vars.SOSOVALUE_REDISTRIBUTION_APPROVED || '0' }}
      BLOCKBEATS_AUX_ENABLED: ${{ vars.BLOCKBEATS_AUX_ENABLED || '0' }}
      BLOCKBEATS_REDISTRIBUTION_APPROVED: ${{ vars.BLOCKBEATS_REDISTRIBUTION_APPROVED || '0' }}
      FRED_THIRD_PARTY_SERIES_APPROVED: ${{ vars.FRED_THIRD_PARTY_SERIES_APPROVED || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: public-market-snapshot
          path: app
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install frontend dependencies
        run: npm --prefix app ci
      - name: Verify source, data, and calendar contracts
        run: |
          npm --prefix app run lint
          npm --prefix app test
          npm --prefix app run verify-market-calendar
      - name: Build static site for GitHub Pages
        run: npm --prefix app run build:pages
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
