name: Update market caches

on:
  schedule:
    - cron: "30 22 * * 1-5"
    - cron: "20 1 1 * *"
    - cron: "20 2 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: market-cache
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/requirements-equity.txt
      - name: Install equity data dependencies
        working-directory: app
        run: python -m pip install -r requirements-equity.txt
      - name: Refresh normalized monthly data
        working-directory: app
        run: node scripts/update-market-data.mjs
      - name: Refresh market session data
        working-directory: app
        env:
          CMC_PRO_API_KEY: ${{ secrets.CMC_PRO_API_KEY }}
        run: node scripts/update-market-session-data.mjs
      - name: Refresh chip-chain data
        working-directory: app
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          CHIP_CHAIN_US_FEED: ${{ vars.CHIP_CHAIN_US_FEED }}
        run: node scripts/update-chip-chain-data.mjs
      - name: Refresh robot-chain data
        working-directory: app
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          CHIP_CHAIN_US_FEED: ${{ vars.CHIP_CHAIN_US_FEED }}
        run: node scripts/update-chip-chain-data.mjs robot
      - name: Refresh weekly equity data
        working-directory: app
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/update-equity-data.py
      - name: Refresh fast equity indicators
        working-directory: app
        env:
          CMC_PRO_API_KEY: ${{ secrets.CMC_PRO_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/update-equity-fast-data.py
      - name: Refresh macro calendar
        working-directory: app
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/update-macro-calendar.py
      - name: Refresh interactive chart series
        working-directory: app
        run: node scripts/update-chart-series-data.mjs
      - name: Commit changed cache
        run: |
          if git diff --quiet -- app/public/data/market-monthly.json app/public/data/market-session.json app/public/data/equity-weekly.json app/public/data/equity-fast.json app/public/data/macro-calendar.json app/public/data/chip-chain-hotspots.json app/public/data/robot-chain-watchlist.json app/public/data/chart-series.json; then
            echo "Cache is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/public/data/market-monthly.json app/public/data/market-session.json app/public/data/equity-weekly.json app/public/data/equity-fast.json app/public/data/macro-calendar.json app/public/data/chip-chain-hotspots.json app/public/data/robot-chain-watchlist.json app/public/data/chart-series.json
          git commit -m "data: refresh market caches"
          git push
