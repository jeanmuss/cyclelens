name: Update market caches

on:
  schedule:
    - cron: "20 1 1 * *"
    - cron: "20 2 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: market-cache
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/requirements-equity.txt
      - name: Install equity data dependencies
        working-directory: app
        run: python -m pip install -r requirements-equity.txt
      - name: Refresh normalized monthly data
        working-directory: app
        run: node scripts/update-market-data.mjs
      - name: Refresh weekly equity data
        working-directory: app
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/update-equity-data.py
      - name: Commit changed cache
        run: |
          if git diff --quiet -- app/public/data/market-monthly.json app/public/data/equity-weekly.json; then
            echo "Cache is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/public/data/market-monthly.json app/public/data/equity-weekly.json
          git commit -m "data: refresh market caches"
          git push
